<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon -->
<link rel="icon" type="image/png" href="./assests/img/favicon.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Canvas 2D</title>

<style>

body{
margin:0;
font-family:'Segoe UI', Tahoma;
background:#f5f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HERO */

.hero{
background:linear-gradient(120deg,#961063d4,#1a7d99);
color:white;
text-align:center;
padding:70px 20px 80px 20px;
position:relative;
}

.hero h1{
font-weight:700;
}

/* WAVE */

.wave{
position:absolute;
bottom:0;
left:0;
width:100%;
height:60px;
}

/* MAIN */

main{
margin-top:-40px;
}

.canvas-card{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
transition:0.3s;
}

.canvas-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,.18);
}

canvas{
border-radius:10px;
}

/* FOOTER */

footer{
margin-top:auto;
background:#111827;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<!-- HERO -->
<section class="hero">

<h1>Graficación por Computadora</h1>
<p>Canvas 2D con Programación Orientada a Objetos</p>

<!-- ONDA MÁS PEQUEÑA -->
<svg class="wave" viewBox="0 0 1440 100" preserveAspectRatio="none">
<path fill="#f5f7fb"
d="M0,40 C200,80 400,0 720,40 C1040,80 1240,10 1440,40 L1440,100 L0,100 Z">
</path>
</svg>

</section>


<!-- CONTENIDO -->
<main class="container pb-5">

<div class="text-center mb-5">
<h2 class="fw-bold">Objetos 2D mediante OOP</h2>
</div>

<div class="row g-4 justify-content-center">

<div class="col-lg-4 col-md-6">
<div class="canvas-card text-center">
<h5 class="mb-3">Objeto 2D</h5>
<canvas id="canvasOOP" width="300" height="200"></canvas>
</div>
</div>

<div class="col-lg-4 col-md-6">
<div class="canvas-card text-center">
<h5 class="mb-3">Objeto Random</h5>
<canvas id="canvasRandom" width="300" height="200"></canvas>
</div>
</div>

<div class="col-lg-4 col-md-6">
<div class="canvas-card text-center">
<h5 class="mb-3">Múltiples Objetos</h5>
<canvas id="canvasMultiple" width="300" height="200"></canvas>
</div>
</div>

</div>

</main>


<!-- FOOTER -->
<footer>

<p>© 2026 HERNANDEZ HERNANDEZ JAQUELINE | Graficación por Computadora</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="./assests/js/main.js"></script>

</body>
</html>
