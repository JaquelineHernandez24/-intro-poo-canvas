<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assests/img/favicon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <title>Intro Canvas 2D</title>

    <style>
        body {
            background: linear-gradient(135deg,#eef2ff,#e0f7ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: linear-gradient(90deg,#667eea,#764ba2);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        header p {
            font-size: 1rem;
            margin-bottom: 0;
        }

        main {
            flex: 1;
            padding: 2rem 1rem;
        }

        .canvas-card {
            background-color: #ffffffcc;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .canvas-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        canvas {
            border-radius: 12px;
            max-width: 100%;
            background: #f7f7f7;
        }

        footer {
            background: linear-gradient(90deg,#141e30,#243b55);
            color: white;
            text-align: center;
            padding: 1rem 0;
            font-size: 0.9rem;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Graficación por Computadora</h1>
        <p>Canvas 2D con Programación Orientada a Objetos</p>
    </header>

    <main class="container my-5">

        <div class="text-center mb-5">
            <h2 class="fw-bold">Objetos 2D mediante OOP</h2>
        </div>

        <div class="row justify-content-center g-4">

            <div class="col-md-4">
                <div class="canvas-card text-center">
                    <h5 class="mb-3">Objeto 2D</h5>
                    <canvas id="canvasOOP" width="300" height="200"></canvas>
                </div>
            </div>

            <div class="col-md-4">
                <div class="canvas-card text-center">
                    <h5 class="mb-3">Objeto con Random</h5>
                    <canvas id="canvasRandom" width="300" height="200"></canvas>
                </div>
            </div>

            <div class="col-md-4">
                <div class="canvas-card text-center">
                    <h5 class="mb-3">Múltiples objetos</h5>
                    <canvas id="canvasMultiple" width="300" height="200"></canvas>
                </div>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        © 2026 DIAZ ROSALES ANAHI | Graficación por Computadora
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Script -->
    <script src="./assets/js/main.js"></script>

</body>

</html>
